name: Build and Deploy Backend

on:
  push:
    branches:
      - backend-CD

# Ensure we have permissions to push to GitHub Container Registry (GHCR)
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare Remote Directories
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.HOST_USERNAME }}
          password: ${{ secrets.HOST_PASSWORD }}
          script: |
            mkdir -p ~/jerryscanai/models
            mkdir -p ~/jerryscanai/results
            mkdir -p ~/jerryscanai/backend

      - name: Copy docker-compose.yml to Remote Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.HOST_USERNAME }}
          password: ${{ secrets.HOST_PASSWORD }}
          source: "docker-compose.yml"
          target: "~/jerryscanai"

      - name: Deploy to Remote Linux Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.HOST_USERNAME }}
          password: ${{ secrets.HOST_PASSWORD }}
          script: |
            cd ~/jerryscanai

            # 1. Create a deployment script to run all docker commands
            cat << 'EOF' > deploy.sh
            #!/bin/bash
            
            # Log in to GHCR
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull the latest image and restart the container
            docker compose pull
            docker compose up -d
            
            # Clean up old unused images to save space
            docker image prune -a -f
            EOF
            
            chmod +x deploy.sh
            
            # 2. Execute the entire script as sudo, passing the password via stdin
            echo "${{ secrets.HOST_PASSWORD }}" | sudo -S ./deploy.sh
            
            # 3. Clean up the script so it doesn't leave secrets behind
            rm deploy.sh
